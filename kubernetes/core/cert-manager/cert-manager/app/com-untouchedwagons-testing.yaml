apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-token-secret
  namespace: cert-manager
type: Opaque
stringData:
  cloudflare-token: REDACTED
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: com-untouchedwagons-testing
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: REDACTED
    privateKeySecretRef:
      name: com-untouchedwagons-testing
    solvers:
      - dns01:
          cloudflare:
            email: REDACTED
            apiTokenSecretRef:
              name: cloudflare-token-secret
              key: cloudflare-token
        selector:
          dnsZones:
            - untouchedwagons.com
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: com-untouchedwagons-testing
  namespace: cert-manager
spec:
  secretName: com-untouchedwagons-testing
  issuerRef:
    name: com-untouchedwagons-testing
    kind: ClusterIssuer
  commonName: '*.testing.untouchedwagons.com'
  dnsNames:
    - testing.untouchedwagons.com
    - '*.testing.untouchedwagons.com'
---
apiVersion: mirrors.kts.studio/v1alpha2
kind: SecretMirror
metadata:
  name: mirror-com-untouchedwagons-testing
  namespace: cert-manager
spec:
  source:
    name: com-untouchedwagons-testing
  destination:
    namespaces:
      - default
