apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mirrors
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: mirrors
      version: 0.1.9
      sourceRef:
        kind: HelmRepository
        name: kts
        namespace: default
      interval: 5m
      dependsOn:
        name: cert-manager
        namespace: cert-manager
